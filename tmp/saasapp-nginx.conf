server {
    listen 80;
    server_name 72.62.241.170;

    # Gzip compression for all text/JSON/JS/CSS responses
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1000;

    # ── Static uploads ───────────────────────────────────────────────────────
    # All uploaded files live under the git checkout so they survive redeploys
    # and are committed to version control (template previews).
    # Express backend uses UPLOADS_DIR=/var/www/saasapp/backend/public/uploads
    # so new previews generated at runtime also land here.
    location /uploads/ {
        alias /var/www/saasapp/backend/public/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
        add_header Cross-Origin-Resource-Policy "cross-origin";
        access_log off;
        try_files $uri =404;
    }

    # SSE (Server-Sent Events) -- disable buffering
    location /api/realtime {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
    }

    # All other requests
    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 20M;
    }
}
