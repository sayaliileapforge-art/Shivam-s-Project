server {
    listen 80;
    server_name 72.62.241.170;

    # Gzip compression for all text/JSON/JS/CSS responses
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1000;

    # ── Static uploads ───────────────────────────────────────────────────────
    # All uploaded files (SFTP assets + Express-generated template previews) are
    # stored under /var/www/uploads/.  Template previews land in the
    # /var/www/uploads/templates/ subdirectory; SFTP assets land in
    # /var/www/uploads/assets/.
    # The backend MUST have UPLOADS_DIR=/var/www/uploads in its .env.
    location /uploads/ {
        alias /var/www/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
        add_header Cross-Origin-Resource-Policy "cross-origin";
        access_log off;
        # Return 404 (not a 500) for missing files so the frontend onError
        # handler can detect a broken preview and trigger re-generation.
        try_files $uri =404;
    }

    # SSE (Server-Sent Events) -- disable buffering
    location /api/realtime {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
    }

    # All other requests
    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 20M;
    }
}
