name: Deploy to Hostinger VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: SSH deploy → 72.62.241.170
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 72.62.241.170
          username: root
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          script: |
            set -e
            echo "=== Pulling latest code ==="
            cd /var/www/saasapp
            git pull origin main

            echo "=== Aligning UPLOADS_DIR to git-checkout path ==="
            # Ensure backend .env always points to the directory inside the repo.
            # This means Express writes new previews to the same place git puts
            # committed ones, and nginx serves them from the same place.
            if grep -q '^UPLOADS_DIR=' /var/www/saasapp/backend/.env 2>/dev/null; then
              sed -i 's|^UPLOADS_DIR=.*|UPLOADS_DIR=/var/www/saasapp/backend/public/uploads|' /var/www/saasapp/backend/.env
            else
              echo 'UPLOADS_DIR=/var/www/saasapp/backend/public/uploads' >> /var/www/saasapp/backend/.env
            fi
            # Keep SFTP_REMOTE_DIR in sync so SFTP uploads also land here
            if grep -q '^SFTP_REMOTE_DIR=' /var/www/saasapp/backend/.env 2>/dev/null; then
              sed -i 's|^SFTP_REMOTE_DIR=.*|SFTP_REMOTE_DIR=/var/www/saasapp/backend/public/uploads|' /var/www/saasapp/backend/.env
            else
              echo 'SFTP_REMOTE_DIR=/var/www/saasapp/backend/public/uploads' >> /var/www/saasapp/backend/.env
            fi

            echo "=== Installing backend dependencies ==="
            cd /var/www/saasapp/backend
            npm ci --omit=dev

            echo "=== Building backend (TypeScript) ==="
            npm run build

            echo "=== Installing frontend dependencies ==="
            cd /var/www/saasapp
            npm ci

            echo "=== Building frontend (Vite) ==="
            npm run build

            echo "=== Ensuring upload directories exist ==="
            mkdir -p /var/www/saasapp/backend/public/uploads/templates
            mkdir -p /var/www/saasapp/backend/public/uploads/assets

            echo "=== Reloading nginx config ==="
            cp /var/www/saasapp/tmp/saasapp-nginx.conf /etc/nginx/sites-enabled/saasapp.conf
            nginx -t && systemctl reload nginx

            echo "=== Restarting backend with PM2 ==="
            pm2 restart saasapp --update-env || pm2 start /var/www/saasapp/backend/dist/server.js --name saasapp --env production
            pm2 save

            echo "=== Deploy complete ==="
            pm2 status
