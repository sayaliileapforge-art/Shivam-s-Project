name: Deploy to Hostinger VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: SSH deploy → 72.62.241.170
    runs-on: ubuntu-latest

    steps:
      - name: Verify secrets are set
        run: |
          if [ -z "${{ secrets.SSH_HOST }}" ]; then echo "ERROR: SSH_HOST is empty"; exit 1; fi
          if [ -z "${{ secrets.SSH_USER }}" ]; then echo "ERROR: SSH_USER is empty"; exit 1; fi
          if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then echo "ERROR: SSH_PRIVATE_KEY is empty"; exit 1; fi
          echo "All secrets are set"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          timeout: 30s
          command_timeout: 30m
          script: |
            set -e

            echo "=== Pulling latest code ==="
            cd /var/www/saasapp
            git fetch --all
            git reset --hard origin/main

            echo "Current commit: $(git log --oneline -1)"

            echo "=== Aligning UPLOADS_DIR ==="
            if grep -q '^UPLOADS_DIR=' /var/www/saasapp/backend/.env 2>/dev/null; then
              sed -i 's|^UPLOADS_DIR=.*|UPLOADS_DIR=/var/www/saasapp/backend/public/uploads|' /var/www/saasapp/backend/.env
            else
              echo 'UPLOADS_DIR=/var/www/saasapp/backend/public/uploads' >> /var/www/saasapp/backend/.env
            fi
            if grep -q '^SFTP_REMOTE_DIR=' /var/www/saasapp/backend/.env 2>/dev/null; then
              sed -i 's|^SFTP_REMOTE_DIR=.*|SFTP_REMOTE_DIR=/var/www/saasapp/backend/public/uploads|' /var/www/saasapp/backend/.env
            else
              echo 'SFTP_REMOTE_DIR=/var/www/saasapp/backend/public/uploads' >> /var/www/saasapp/backend/.env
            fi

            echo "=== Installing backend dependencies ==="
            cd /var/www/saasapp/backend
            npm ci

            echo "=== Building backend ==="
            npm run build

            echo "=== Installing frontend dependencies ==="
            cd /var/www/saasapp
            npm ci

            echo "=== Building frontend ==="
            npm run build

            echo "=== Ensuring upload directories exist ==="
            mkdir -p /var/www/saasapp/backend/public/uploads/templates
            mkdir -p /var/www/saasapp/backend/public/uploads/assets

            echo "=== Reloading nginx ==="
            cp /var/www/saasapp/tmp/saasapp-nginx.conf /etc/nginx/sites-enabled/saasapp.conf
            nginx -t && systemctl reload nginx

            echo "=== Restarting backend with PM2 ==="
            pm2 restart saasapp --update-env || pm2 start /var/www/saasapp/backend/dist/server.js --name saasapp --env production

            echo "=== Restarting AI service with PM2 ==="
            # NODE_ENV=production tells the AI service it's on the VPS so it uses the
            # RAM-aware worker cap. max_memory_restart lets PM2 restart the service
            # *gracefully* if it bloats, instead of letting the Linux OOM-killer
            # SIGKILL it (which loses the in-flight batch and 503s every poll).
            export NODE_ENV=production
            pm2 restart saasapp-ai --update-env || pm2 start /var/www/saasapp/backend/ai_service/main.py \
              --name saasapp-ai \
              --interpreter python3 \
              --max-memory-restart 1500M \
              --cwd /var/www/saasapp/backend/ai_service
            pm2 save

            echo "=== Deploy complete ==="
            git log --oneline -1
            pm2 status
