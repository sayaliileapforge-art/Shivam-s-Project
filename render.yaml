services:
  - type: web
    name: enterprise-saas-app
    runtime: node
    rootDir: .
    buildCommand: npm ci --include=dev && npm --prefix backend ci && npm run build:all
    startCommand: npm run start:render
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: FRONTEND_URL
        sync: false
