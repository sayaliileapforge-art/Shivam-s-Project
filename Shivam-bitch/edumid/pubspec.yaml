name: edumid
description: EDUMID - Variable Data Printing Super App for Schools
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
                    
  # Navigation
  go_router: ^12.1.1

  # Networking
  dio: ^5.3.2
  retrofit: ^4.0.3

  # Storage
  shared_preferences: ^2.2.1
  flutter_secure_storage: ^9.0.0

  # UI Components
  google_fonts: ^6.1.0
  flutter_animate: ^4.2.0+1
  lottie: ^2.7.0
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  flutter_svg: ^2.0.9
  intl: ^0.18.1

  # Image Handling
  image_picker: ^1.0.4
  image_cropper: ^8.0.0
  camera: ^0.11.0+2

  # File Handling
  file_picker: ^8.0.0
  path_provider: ^2.1.1
  open_file: ^3.3.2
  permission_handler: ^11.0.1
  
  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.0

  # Charts & Analytics
  fl_chart: ^0.64.0

  # PDF
  pdf: ^3.10.4
  printing: ^5.11.0

  # Excel parsing
  excel: ^4.0.6

  # Utils
  uuid: ^4.1.0
  timeago: ^3.6.0
  url_launcher: ^6.2.1
  share_plus: ^7.2.1
  connectivity_plus: ^5.0.1

  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.6
  retrofit_generator: ^8.0.4
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
