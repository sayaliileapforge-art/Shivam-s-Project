<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 350" width="250" height="350">
  <!-- Dark card background -->
  <rect width="250" height="350" rx="12" fill="#1e1b4b"/>
  <!-- Gradient top section -->
  <rect width="250" height="176" rx="12" fill="#4338ca"/>
  <rect y="164" width="250" height="14" fill="#4338ca"/>
  <!-- Decorative circles -->
  <circle cx="220" cy="30" r="50" fill="#6366f1" opacity="0.3"/>
  <circle cx="10"  cy="150" r="60" fill="#818cf8" opacity="0.15"/>
  <!-- School name -->
  <text x="125" y="32" font-family="Arial,sans-serif" font-size="11" font-weight="bold"
        fill="white" text-anchor="middle" opacity="0.9">SCHOOL NAME</text>
  <!-- Large photo area (right side, lower) -->
  <rect x="168" y="200" width="64" height="80" rx="8" fill="#4338ca" opacity="0.6"/>
  <circle cx="200" cy="224" r="18" fill="#6366f1"/>
  <ellipse cx="200" cy="262" rx="24" ry="14" fill="#6366f1"/>
  <!-- Left side text area -->
  <rect x="18" y="186" width="140" height="14" rx="3" fill="#818cf8" opacity="0.4"/>
  <rect x="18" y="208" width="110" height="10" rx="3" fill="#818cf8" opacity="0.3"/>
  <rect x="18" y="226" width="120" height="10" rx="3" fill="#818cf8" opacity="0.3"/>
  <!-- QR area -->
  <rect x="18"  y="290" width="50" height="50" rx="4" fill="#312e81"/>
  <rect x="22"  y="294" width="42" height="42" rx="2" fill="#4338ca"/>
  <rect x="26"  y="298" width="10" height="10" fill="#e0e7ff"/>
  <rect x="40"  y="298" width="10" height="10" fill="#e0e7ff"/>
  <rect x="26"  y="322" width="10" height="10" fill="#e0e7ff"/>
  <rect x="33"  y="308" width="8"  height="8"  fill="#e0e7ff"/>
  <rect x="44"  y="312" width="6"  height="6"  fill="#e0e7ff"/>
  <!-- Bottom info -->
  <rect x="80"  y="296" width="90" height="9" rx="3" fill="#6366f1" opacity="0.5"/>
  <rect x="80"  y="312" width="70" height="9" rx="3" fill="#6366f1" opacity="0.5"/>
  <rect x="80"  y="328" width="80" height="9" rx="3" fill="#6366f1" opacity="0.5"/>
</svg>
