<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 350" width="250" height="350">
  <!-- Card background -->
  <rect width="250" height="350" rx="10" fill="#f0fdf4"/>
  <!-- Green left stripe -->
  <rect width="12" height="350" rx="0" fill="#16a34a"/>
  <!-- Header -->
  <rect x="12" y="0" width="238" height="44" fill="#dcfce7"/>
  <text x="130" y="26" font-family="Arial,sans-serif" font-size="12" font-weight="bold"
        fill="#14532d" text-anchor="middle">IDENTITY CARD</text>
  <!-- Photo box -->
  <rect x="18" y="52" width="84" height="100" rx="6" fill="#bbf7d0"/>
  <circle cx="60" cy="85" r="20" fill="#86efac"/>
  <ellipse cx="60" cy="120" rx="28" ry="18" fill="#86efac"/>
  <!-- Right side fields -->
  <text x="118" y="76" font-family="Arial,sans-serif" font-size="9" fill="#166534">NAME</text>
  <rect x="118" y="82" width="118" height="14" rx="3" fill="#bbf7d0"/>
  <text x="118" y="110" font-family="Arial,sans-serif" font-size="9" fill="#166534">ADM NO.</text>
  <rect x="118" y="116" width="118" height="14" rx="3" fill="#bbf7d0"/>
  <text x="118" y="142" font-family="Arial,sans-serif" font-size="9" fill="#166534">CLASS</text>
  <rect x="118" y="148" width="118" height="14" rx="3" fill="#bbf7d0"/>
  <!-- Divider -->
  <line x1="18" y1="170" x2="240" y2="170" stroke="#86efac" stroke-width="1.5"/>
  <!-- Additional fields area -->
  <rect x="18" y="182" width="210" height="10" rx="3" fill="#dcfce7"/>
  <rect x="18" y="202" width="160" height="10" rx="3" fill="#dcfce7"/>
  <rect x="18" y="222" width="180" height="10" rx="3" fill="#dcfce7"/>
  <!-- Barcode area -->
  <rect x="50" y="300" width="150" height="30" rx="4" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <line x1="58"  y1="306" x2="58"  y2="324" stroke="#14532d" stroke-width="2"/>
  <line x1="64"  y1="306" x2="64"  y2="324" stroke="#14532d" stroke-width="1"/>
  <line x1="70"  y1="306" x2="70"  y2="324" stroke="#14532d" stroke-width="3"/>
  <line x1="78"  y1="306" x2="78"  y2="324" stroke="#14532d" stroke-width="1"/>
  <line x1="84"  y1="306" x2="84"  y2="324" stroke="#14532d" stroke-width="2"/>
  <line x1="90"  y1="306" x2="90"  y2="324" stroke="#14532d" stroke-width="1"/>
  <line x1="96"  y1="306" x2="96"  y2="324" stroke="#14532d" stroke-width="3"/>
  <line x1="104" y1="306" x2="104" y2="324" stroke="#14532d" stroke-width="1"/>
  <line x1="110" y1="306" x2="110" y2="324" stroke="#14532d" stroke-width="2"/>
  <line x1="116" y1="306" x2="116" y2="324" stroke="#14532d" stroke-width="1"/>
  <line x1="122" y1="306" x2="122" y2="324" stroke="#14532d" stroke-width="3"/>
  <line x1="130" y1="306" x2="130" y2="324" stroke="#14532d" stroke-width="1"/>
  <line x1="136" y1="306" x2="136" y2="324" stroke="#14532d" stroke-width="2"/>
  <line x1="142" y1="306" x2="142" y2="324" stroke="#14532d" stroke-width="1"/>
  <line x1="148" y1="306" x2="148" y2="324" stroke="#14532d" stroke-width="3"/>
  <line x1="156" y1="306" x2="156" y2="324" stroke="#14532d" stroke-width="1"/>
  <line x1="162" y1="306" x2="162" y2="324" stroke="#14532d" stroke-width="2"/>
  <line x1="168" y1="306" x2="168" y2="324" stroke="#14532d" stroke-width="1"/>
  <line x1="174" y1="306" x2="174" y2="324" stroke="#14532d" stroke-width="2"/>
  <line x1="180" y1="306" x2="180" y2="324" stroke="#14532d" stroke-width="1"/>
  <line x1="186" y1="306" x2="186" y2="324" stroke="#14532d" stroke-width="3"/>
  <!-- Footer -->
  <rect x="12" y="338" width="238" height="12" rx="0" fill="#16a34a"/>
</svg>
