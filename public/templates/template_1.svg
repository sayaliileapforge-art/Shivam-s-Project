<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 350" width="250" height="350">
  <!-- Card background -->
  <rect width="250" height="350" rx="12" fill="#1d4ed8"/>
  <!-- Header band -->
  <rect y="0" width="250" height="90" rx="12" fill="#1e40af"/>
  <rect y="78" width="250" height="14" fill="#1e40af"/>
  <!-- School logo placeholder -->
  <circle cx="125" cy="44" r="28" fill="#3b82f6" opacity="0.7"/>
  <text x="125" y="50" font-family="Arial,sans-serif" font-size="11" font-weight="bold"
        fill="white" text-anchor="middle">SCHOOL</text>
  <!-- Photo circle -->
  <circle cx="125" cy="145" r="44" fill="#93c5fd"/>
  <circle cx="125" cy="135" r="18" fill="#bfdbfe"/>
  <ellipse cx="125" cy="165" rx="26" ry="16" fill="#bfdbfe"/>
  <!-- Name placeholder -->
  <rect x="30" y="202" width="190" height="16" rx="4" fill="#bfdbfe" opacity="0.5"/>
  <!-- Admission No placeholder -->
  <rect x="50" y="228" width="150" height="12" rx="3" fill="#bfdbfe" opacity="0.4"/>
  <!-- Class placeholder -->
  <rect x="60" y="250" width="130" height="12" rx="3" fill="#bfdbfe" opacity="0.4"/>
  <!-- Footer band -->
  <rect y="310" width="250" height="40" rx="0" fill="#1e3a8a"/>
  <rect y="310" width="250" height="8" rx="0" fill="#2563eb"/>
  <text x="125" y="334" font-family="Arial,sans-serif" font-size="10"
        fill="#93c5fd" text-anchor="middle">IDENTITY CARD</text>
</svg>
